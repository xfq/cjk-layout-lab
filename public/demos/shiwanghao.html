<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symbol of Death Demo | CJK Layout Lab</title>
  <style>
    :root {
      --baseline: 8px;
      --color-bg: #f3f3f1;
      --color-card: #fbfbfa;
      --color-text: #111111;
      --color-accent: #e83929;
      --color-rule: rgba(17, 17, 17, 0.18);
      --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-text: "Songti SC", "STSong", "Noto Serif CJK SC", "Source Han Serif SC", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--color-text);
      font-family: var(--font-ui);
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 255, 255, 0.8), transparent 36%),
        radial-gradient(circle at 82% 78%, rgba(0, 0, 0, 0.06), transparent 40%),
        var(--color-bg);
    }

    .lab-nav {
      position: fixed;
      inset: calc(var(--baseline) * 2) calc(var(--baseline) * 3) auto;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: calc(var(--baseline) * 2);
      width: calc(100% - var(--baseline) * 6);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text);
    }

    .lab-nav a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    .lab-nav a:hover {
      border-bottom-color: var(--color-accent);
    }

    .page {
      width: min(1100px, 94vw);
      margin: 0 auto;
      padding: calc(var(--baseline) * 12) 0 calc(var(--baseline) * 8);
      display: grid;
      gap: calc(var(--baseline) * 4);
    }

    .hero {
      border: 1px solid var(--color-rule);
      background: var(--color-card);
      padding: calc(var(--baseline) * 5);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.08);
      display: grid;
      gap: calc(var(--baseline) * 2.5);
    }

    .tag {
      margin: 0;
      color: var(--color-accent);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.9rem, 4vw, 3rem);
      line-height: 1.2;
      font-family: var(--font-text);
    }

    .subtitle {
      margin: 0;
      line-height: 1.75;
      max-width: 68ch;
    }

    .name-line {
      margin: calc(var(--baseline) * 2) 0 0 0;
      padding: calc(var(--baseline) * 2.5) 0;
      border-top: 1px solid rgba(17, 17, 17, 0.1);
      border-bottom: 1px solid rgba(17, 17, 17, 0.1);
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: calc(var(--baseline) * 2.5) calc(var(--baseline) * 4.5);
      font-family: var(--font-text);
      font-size: clamp(1.1rem, 3vw, 2rem);
      letter-spacing: 0.02em;
      line-height: 1.16;
    }

    .role,
    .name {
      white-space: nowrap;
    }

    .shiwanghao {
      display: inline-block;
      border: 0.1em solid #111111;
      padding: 0.02em 0.14em 0.06em;
      white-space: nowrap;
      line-height: 1.02;
    }

    .caption {
      margin: 0;
      color: rgba(17, 17, 17, 0.82);
      font-size: 0.95rem;
      line-height: 1.75;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: calc(var(--baseline) * 3);
    }

    .card {
      border: 1px solid var(--color-rule);
      background: var(--color-card);
      padding: calc(var(--baseline) * 4);
      display: grid;
      gap: calc(var(--baseline) * 2);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.06);
    }

    .card h2 {
      margin: 0;
      font-family: var(--font-text);
      font-size: 1.5rem;
      line-height: 1.3;
    }

    .card p {
      margin: 0;
      line-height: 1.78;
    }

    .latin-demo {
      border: 1px dashed rgba(17, 17, 17, 0.25);
      background: rgba(255, 255, 255, 0.7);
      padding: calc(var(--baseline) * 2);
      font-size: 1rem;
      line-height: 1.75;
      display: grid;
      gap: calc(var(--baseline) * 1);
    }

    .dagger {
      color: var(--color-accent);
      font-weight: 700;
      margin-right: 0.25em;
    }

    .note {
      color: rgba(17, 17, 17, 0.76);
      font-size: 0.92rem;
    }

    code {
      font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", "Fira Code", "Consolas", "Liberation Mono", "Menlo", monospace;
      font-size: 0.9em;
      background: rgba(17, 17, 17, 0.08);
      padding: 0.08em 0.35em;
    }

    @media (max-width: 900px) {
      .compare-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .lab-nav span {
        display: none;
      }

      .page {
        padding: calc(var(--baseline) * 10) 0 calc(var(--baseline) * 6);
      }

      .hero,
      .card {
        padding: calc(var(--baseline) * 3);
      }

      .name-line {
        gap: calc(var(--baseline) * 1.5) calc(var(--baseline) * 2.2);
      }
    }
  </style>
</head>
<body>
  <nav class="lab-nav" aria-label="Demo navigation">
    <a href="../">&larr; Back to Lab</a>
    <span>CSS Backgrounds and Borders Level 3</span>
  </nav>

  <main class="page">
    <section class="hero" aria-label="Symbol of death main visual sample">
      <p class="tag">SYMBOL OF DEATH DEMO</p>
      <h1>示亡号排版示例</h1>
      <p class="subtitle">示亡号（示殁号）常见于中文人名标示场景：</p>
      <div class="name-line" lang="zh-Hans">
        <span class="role">副主编</span>
        <span class="name shiwanghao">吴文祺</span>
        <span class="name">张涤华</span>
        <span class="name">陈　落</span>
        <span class="name shiwanghao">洪　诚</span>
      </div>
      <!-- <p class="caption">实现上可用<code>span</code>包裹姓名并设置边框。为避免姓名拆断，建议配合<code>white-space: nowrap</code>。</p> -->
    </section>

    <section class="compare-grid" aria-label="symbol comparison">
      <article class="card">
        <h2>西文对照</h2>
        <p>西文排版中，<code>†</code>与<code>‡</code>常见于注释序号，也可在人物语境中表达已故。两者在语义上可类比，但写法与排版位置不同于示亡号。</p>
        <div class="latin-demo" lang="en">
          <p><span class="dagger">†</span>John Doe (deceased)</p>
          <p><span class="dagger">‡</span>Secondary footnote marker</p>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
