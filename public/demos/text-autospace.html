<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>East Asian Spacing Demo | CJK Layout Lab</title>
  <style>
    :root {
      --baseline: 8px;
      --color-bg: #f6f2eb;
      --color-paper: rgba(255, 255, 255, 0.92);
      --color-paper-strong: #ffffff;
      --color-text: #111111;
      --color-accent: #e83929;
      --color-muted: rgba(17, 17, 17, 0.72);
      --color-rule: rgba(17, 17, 17, 0.15);
      --color-shadow: rgba(17, 17, 17, 0.12);
      --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-text: "Songti SC", "STSong", "Noto Serif CJK SC", "Source Han Serif SC", serif;
      --font-mono: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", "Fira Code", "Consolas", "Liberation Mono", "Menlo", monospace;
    }

    :lang(zh-Hans) {
      font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      text-autospace: no-autospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--color-text);
      font-family: var(--font-ui);
      background:
        radial-gradient(circle at 12% 16%, rgba(232, 57, 41, 0.14), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(17, 17, 17, 0.08), transparent 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.32), transparent 38%),
        var(--color-bg);
    }

    .lab-nav {
      position: fixed;
      inset: calc(var(--baseline) * 2) calc(var(--baseline) * 3) auto;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: calc(var(--baseline) * 2);
      width: calc(100% - var(--baseline) * 6);
      color: var(--color-text);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .lab-nav a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    .lab-nav a:hover {
      border-bottom-color: var(--color-accent);
    }

    .page {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: calc(var(--baseline) * 12) 0 calc(var(--baseline) * 7);
      display: grid;
      gap: calc(var(--baseline) * 3.5);
    }

    .panel {
      position: relative;
      overflow: hidden;
      background: var(--color-paper);
      border: 1px solid var(--color-rule);
      box-shadow:
        0 18px 48px rgba(17, 17, 17, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(14px);
    }

    .hero {
      display: grid;
      gap: calc(var(--baseline) * 2.5);
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.9fr);
      align-items: stretch;
    }

    .hero-copy,
    .hero-code,
    .compare {
      padding: calc(var(--baseline) * 4);
    }

    .tag {
      margin: 0 0 calc(var(--baseline) * 1.25) 0;
      color: var(--color-accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: var(--font-text);
      font-weight: 700;
      line-height: 1.15;
    }

    h1 {
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      letter-spacing: -0.03em;
      max-width: 12ch;
    }

    h2 {
      font-size: clamp(1.5rem, 2vw, 2rem);
    }

    p {
      margin: 0;
    }

    .hero-copy {
      display: grid;
      gap: calc(var(--baseline) * 2);
      align-content: start;
    }

    .lede {
      max-width: 38rem;
      font-size: 1.08rem;
      line-height: 1.9;
      color: var(--color-muted);
    }

    .hero-notes {
      display: grid;
      gap: calc(var(--baseline) * 1.25);
      margin-top: calc(var(--baseline) * 1.5);
    }

    .note-row {
      display: grid;
      gap: calc(var(--baseline) * 0.5);
      grid-template-columns: minmax(7rem, 8rem) minmax(0, 1fr);
      align-items: start;
      padding-top: calc(var(--baseline) * 1.2);
      border-top: 1px solid rgba(17, 17, 17, 0.08);
      font-size: 0.94rem;
      line-height: 1.7;
    }

    .note-row strong {
      color: var(--color-accent);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-code {
      display: grid;
      gap: calc(var(--baseline) * 2.5);
      align-content: space-between;
      background:
        linear-gradient(135deg, rgba(232, 57, 41, 0.08), transparent 48%),
        linear-gradient(180deg, rgba(17, 17, 17, 0.02), rgba(17, 17, 17, 0.01)),
        var(--color-paper-strong);
    }

    .formula {
      display: grid;
      gap: calc(var(--baseline) * 1.4);
    }

    .formula pre,
    .source-strip code {
      margin: 0;
      font-family: var(--font-mono);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .formula pre {
      padding: calc(var(--baseline) * 3);
      border: 1px solid rgba(17, 17, 17, 0.1);
      background: #141414;
      color: #f8f4ed;
      font-size: 1rem;
      line-height: 1.8;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .formula .accent {
      color: #ff8579;
    }

    .formula .comment {
      color: rgba(248, 244, 237, 0.62);
    }

    .formula-copy {
      color: var(--color-muted);
      line-height: 1.8;
    }

    .support-note {
      padding: calc(var(--baseline) * 2);
      border-left: 3px solid var(--color-accent);
      background: rgba(232, 57, 41, 0.05);
      color: rgba(17, 17, 17, 0.82);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    .section-head {
      display: grid;
      gap: calc(var(--baseline) * 0.9);
      margin-bottom: calc(var(--baseline) * 3);
    }

    .section-head p {
      max-width: 46rem;
      color: var(--color-muted);
      line-height: 1.8;
    }

    .compare {
      display: grid;
      gap: calc(var(--baseline) * 2.5);
    }

    .comparison-grid {
      display: grid;
      gap: calc(var(--baseline) * 2);
    }

    .comparison-row {
      display: grid;
      gap: calc(var(--baseline) * 2.25);
      grid-template-columns: minmax(150px, 180px) minmax(0, 1fr);
      align-items: stretch;
      padding: calc(var(--baseline) * 2.4);
      border: 1px solid rgba(17, 17, 17, 0.1);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.55)),
        repeating-linear-gradient(
          90deg,
          transparent 0 calc(1.65rem - 1px),
          rgba(17, 17, 17, 0.06) calc(1.65rem - 1px) 1.65rem
        );
    }

    .comparison-row.auto {
      box-shadow: inset 0 0 0 1px rgba(232, 57, 41, 0.18);
      background:
        linear-gradient(180deg, rgba(232, 57, 41, 0.06), rgba(255, 255, 255, 0.72) 52%),
        repeating-linear-gradient(
          90deg,
          transparent 0 calc(1.65rem - 1px),
          rgba(17, 17, 17, 0.06) calc(1.65rem - 1px) 1.65rem
        );
    }

    .row-meta {
      display: grid;
      gap: calc(var(--baseline) * 0.55);
      align-content: start;
    }

    .row-meta .eyebrow {
      color: var(--color-accent);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .row-meta h3 {
      font-size: 1.35rem;
    }

    .row-meta p {
      color: var(--color-muted);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    .specimen-box {
      display: grid;
      gap: calc(var(--baseline) * 1.15);
      align-content: center;
      min-height: 11rem;
    }

    .sample-source {
      font-family: var(--font-text);
      font-size: clamp(3rem, 7vw, 5.5rem);
      line-height: 1.2;
      text-wrap: pretty;
      max-width: none;
      letter-spacing: 0;
    }

    .comparison-row.no-auto .sample-source {
      text-autospace: no-autospace;
    }

    .comparison-row.auto .sample-source {
      text-autospace: normal;
    }

    .source-strip {
      display: grid;
      gap: calc(var(--baseline) * 0.75);
      padding: calc(var(--baseline) * 2);
      border: 1px dashed rgba(17, 17, 17, 0.16);
      background: rgba(17, 17, 17, 0.02);
    }

    .source-strip strong {
      color: var(--color-accent);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .source-strip code {
      font-size: 0.94rem;
      line-height: 1.7;
    }

    .source-strip p {
      color: var(--color-muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    code {
      font-family: var(--font-mono);
      font-size: 0.94em;
      background: rgba(17, 17, 17, 0.06);
      padding: 0.12em 0.34em;
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .lab-nav span {
        display: none;
      }

      .page {
        width: min(94vw, 720px);
        padding: calc(var(--baseline) * 10) 0 calc(var(--baseline) * 5);
      }

      .hero-copy,
      .hero-code,
      .compare {
        padding: calc(var(--baseline) * 3);
      }

      .comparison-row {
        grid-template-columns: 1fr;
      }

      .comparison-row {
        padding: calc(var(--baseline) * 2);
      }

      .sample-source {
        max-width: none;
        font-size: clamp(2.8rem, 14vw, 3.6rem);
      }

      .note-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav class="lab-nav" aria-label="Demo navigation">
    <a href="../">&larr; Back to Lab</a>
    <span>CSS Text Level 4</span>
  </nav>

  <main class="page">
    <section class="compare panel" aria-labelledby="compare-heading">
      <!-- <div class="section-head">
        <p class="tag">East Asian Spacing</p>
      </div> -->

      <div class="comparison-grid">
        <article class="comparison-row no-auto">
          <div class="row-meta">
            <p class="eyebrow">Without</p>
            <h3>no-autospace</h3>
            <p>西文紧贴在汉字之间，边界偏硬。</p>
          </div>
          <div class="specimen-box">
            <p class="sample-source">CSS第3版</p>
          </div>
        </article>

        <article class="comparison-row auto">
          <div class="row-meta">
            <p class="eyebrow">With</p>
            <h3>normal</h3>
            <p>汉字与西文字母或阿拉伯数字间增加间距，节奏更松一点。</p>
          </div>
          <div class="specimen-box">
            <p class="sample-source">CSS第3版</p>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
